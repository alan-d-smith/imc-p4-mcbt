<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prosperity 4 Leaderboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --gold: #f1c40f;
      --silver: #95a5a6;
      --bronze: #cd7f32;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; }
    header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .trophy { font-size: 36px; }
    .subtitle { color: var(--text-dim); font-size: 14px; }
    .cmd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-top: 12px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      color: var(--accent);
      overflow-x: auto;
    }
    .links { margin-top: 12px; font-size: 14px; }
    .links a { color: var(--accent); text-decoration: none; margin-right: 16px; }
    .links a:hover { text-decoration: underline; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: rgba(255,255,255,0.03);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      font-weight: 600;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(88,166,255,0.04); }
    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .rank-1 { background: rgba(241,196,15,0.15); color: var(--gold); }
    .rank-2 { background: rgba(149,165,166,0.15); color: var(--silver); }
    .rank-3 { background: rgba(205,127,50,0.15); color: var(--bronze); }
    .rank-other { background: rgba(255,255,255,0.05); color: var(--text-dim); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .mean { font-weight: 700; font-size: 16px; color: var(--accent); }
    .name { font-weight: 600; }
    .time { color: var(--text-dim); font-size: 13px; }
    .empty, .loading, .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .error { color: #f85149; }
    .footer {
      margin-top: 32px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }
    @media (max-width: 640px) {
      .hide-mobile { display: none; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="trophy">🏆</span> Prosperity 4 Leaderboard</h1>
      <p class="subtitle">Submit your score by running the backtester with <code>--leaderboard-run</code>.</p>
      <div class="cmd">prosperity4mcbt your_trader.py --leaderboard-run --display-name "your_name"</div>
      <div class="links">
        <a href="https://github.com/chrispyroberts/imc-prosperity-4/releases" target="_blank">Download the binary</a>
        <a href="https://github.com/chrispyroberts/imc-prosperity-4" target="_blank">GitHub</a>
      </div>
    </header>

    <div id="content" class="loading">Loading leaderboard...</div>

    <div class="footer">Auto-refreshes every 30 seconds</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mythkdjdlufqruceodhr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_g0xoqHNushRWOa76bGp40w_ZrPMmSfQ';

    function timeAgo(dateStr) {
      const seconds = Math.floor((Date.now() - Date.parse(dateStr)) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    function fmt(n, decimals = 1) {
      return Number(n).toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });
    }

    function rankBadge(rank) {
      if (rank === 1) return `<span class="rank rank-1">🥇 1</span>`;
      if (rank === 2) return `<span class="rank rank-2">🥈 2</span>`;
      if (rank === 3) return `<span class="rank rank-3">🥉 3</span>`;
      return `<span class="rank rank-other">#${rank}</span>`;
    }

    async function load() {
      const el = document.getElementById('content');
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/leaderboard?order=score_mean.desc&limit=100`,
          { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.length === 0) {
          el.className = 'empty';
          el.textContent = 'No submissions yet. Be the first!';
          return;
        }

        el.className = '';
        el.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>User</th>
                <th class="num">Mean PnL</th>
                <th class="num hide-mobile">Std</th>
                <th class="num hide-mobile">P5</th>
                <th class="num hide-mobile">Median</th>
                <th class="num hide-mobile">P95</th>
                <th class="num hide-mobile">Sessions</th>
                <th class="num">Submitted</th>
              </tr>
            </thead>
            <tbody>
              ${data.map((row, i) => `
                <tr>
                  <td>${rankBadge(i + 1)}</td>
                  <td class="name">${(row.display_name || row.user_hash.slice(0, 8)).replace(/</g, '&lt;')}</td>
                  <td class="num mean">${fmt(row.score_mean)}</td>
                  <td class="num hide-mobile">${fmt(row.score_std)}</td>
                  <td class="num hide-mobile">${row.score_p05 != null ? fmt(row.score_p05, 0) : '—'}</td>
                  <td class="num hide-mobile">${row.score_p50 != null ? fmt(row.score_p50, 0) : '—'}</td>
                  <td class="num hide-mobile">${row.score_p95 != null ? fmt(row.score_p95, 0) : '—'}</td>
                  <td class="num hide-mobile">${row.sessions}</td>
                  <td class="num time">${timeAgo(row.submitted_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        el.className = 'error';
        el.textContent = `Failed to load: ${e.message}`;
      }
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
